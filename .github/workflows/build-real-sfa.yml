name: Build Real Nexora VPN from SFA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

env:
  NEXORA_PANEL_URL: "https://nexora-two-mu.vercel.app"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout Nexora builder
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git unzip zip

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.7'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Clone official sing-box Android client with submodules
        run: |
          git clone --recursive https://github.com/SagerNet/sing-box-for-android.git sfa
          cd sfa
          git submodule update --init --recursive

      - name: Clone sing-box core
        run: |
          git clone --recursive https://github.com/SagerNet/sing-box.git sing-box-core
          cd sing-box-core
          git submodule update --init --recursive

      - name: Apply Nexora branding and panel defaults
        run: |
          python3 tools/patch_sfa.py sfa "$NEXORA_PANEL_URL"

      - name: Build libbox.aar
        run: |
          set -euxo pipefail

          cd sing-box-core

          export ANDROID_HOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"

          if [ -d "$ANDROID_HOME/ndk/28.0.13004108" ]; then
            export ANDROID_NDK_ROOT="$ANDROID_HOME/ndk/28.0.13004108"
          elif [ -z "${ANDROID_NDK_ROOT:-}" ]; then
            export ANDROID_NDK_ROOT="$(find "$ANDROID_HOME/ndk" -maxdepth 1 -mindepth 1 -type d | sort -V | tail -1)"
          fi

          export ANDROID_NDK_HOME="$ANDROID_NDK_ROOT"

          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
          go version

          echo "Installing SagerNet gomobile..."
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.12
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.12

          export PATH="$(go env GOPATH)/bin:$PATH"

          gomobile init

          echo "Removing with_naive_outbound tag to avoid Cronet linker issues..."
          grep -RIl "with_naive_outbound" ./cmd/internal ./cmd | xargs sed -i 's/,with_naive_outbound//g; s/with_naive_outbound,//g; s/with_naive_outbound//g' || true

          echo "Building libbox..."
          go run ./cmd/internal/build_libbox -target android

          echo "Searching libbox.aar..."
          find . -name "libbox.aar" -type f

          mkdir -p ../sfa/app/libs

          LIBBOX_PATH="$(find . -name "libbox.aar" -type f | head -1)"
          test -f "$LIBBOX_PATH"

          cp "$LIBBOX_PATH" ../sfa/app/libs/libbox.aar
          cp "$LIBBOX_PATH" ../sfa/app/libs/libbox-legacy.aar

          ls -lh ../sfa/app/libs/

      - name: Build only modern APK variant
        working-directory: sfa
        run: |
          chmod +x ./gradlew || true
          ./gradlew :app:assembleOtherDebug --stacktrace

      - name: Collect APKs
        run: |
          mkdir -p output
          find sfa/app/build/outputs/apk -type f -name "*.apk" -print -exec cp {} output/ \;
          ls -la output

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexoraVPN-real-apk
          path: output/*.apk
