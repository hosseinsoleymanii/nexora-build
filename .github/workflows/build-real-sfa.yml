name: Build Real Nexora VPN from SFA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

env:
  NEXORA_PANEL_URL: "https://nexora-two-mu.vercel.app"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Nexora builder
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git unzip zip

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Clone official sing-box Android client with submodules
        run: |
          git clone --recursive https://github.com/SagerNet/sing-box-for-android.git sfa
          cd sfa
          git submodule update --init --recursive
          echo "SFA source cloned with submodules"
          ls -la
          ls -la third_party || true
          ls -la third_party/termux-app || true

      - name: Apply Nexora branding and panel defaults
        run: |
          python3 tools/patch_sfa.py sfa "$NEXORA_PANEL_URL"

      - name: Build sing-box libbox.aar
        run: |
          set -euxo pipefail

          echo "Cloning sing-box core source..."
          git clone --recursive https://github.com/SagerNet/sing-box.git sing-box-core
          cd sing-box-core
          git submodule update --init --recursive

          echo "Android SDK: $ANDROID_HOME"
          echo "Android NDK root before detection: ${ANDROID_NDK_ROOT:-}"
          export ANDROID_HOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"

          # Detect the installed NDK. setup-android/Gradle may install version 28 automatically,
          # but build_libbox can also trigger installs via Android Gradle plugin.
          if [ -z "${ANDROID_NDK_ROOT:-}" ]; then
            export ANDROID_NDK_ROOT="$(find "$ANDROID_HOME/ndk" -maxdepth 1 -mindepth 1 -type d | sort -V | tail -1 || true)"
          fi
          if [ -z "${ANDROID_NDK_HOME:-}" ]; then
            export ANDROID_NDK_HOME="$ANDROID_NDK_ROOT"
          fi

          echo "Detected ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
          go version

          echo "Installing SagerNet gomobile fork..."
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.12
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.12
          export PATH="$(go env GOPATH)/bin:$PATH"
          which gomobile
          gomobile version || true

          echo "Initializing SagerNet gomobile for Android..."
          gomobile init

          echo "Checking gomobile help supports -libname..."
          gomobile bind -h 2>&1 | head -80 || true

          echo "Building libbox.aar. This can take several minutes..."
          go run ./cmd/internal/build_libbox -target android

          echo "Searching generated libbox.aar..."
          find . -name "libbox.aar" -type f -print

          mkdir -p ../sfa/app/libs
          LIBBOX_PATH="$(find . -name "libbox.aar" -type f | head -1)"
          test -f "$LIBBOX_PATH"
          cp "$LIBBOX_PATH" ../sfa/app/libs/libbox.aar

          echo "Copied libbox to SFA:"
          ls -lh ../sfa/app/libs/libbox.aar


      - name: Show Gradle files
        run: |
          find sfa -maxdepth 3 -name "settings.gradle*" -o -name "build.gradle*" | sort
          find sfa -maxdepth 3 -name "gradlew" -ls || true

      - name: Ensure submodules exist
        working-directory: sfa
        run: |
          git submodule update --init --recursive
          test -d third_party/termux-app/terminal-view

      - name: Build APK
        working-directory: sfa
        run: |
          test -f app/libs/libbox.aar
          ls -lh app/libs/libbox.aar
          chmod +x ./gradlew || true
          ./gradlew assembleDebug --stacktrace

      - name: Collect APKs
        run: |
          mkdir -p output
          find sfa -type f -name "*.apk" -print -exec cp {} output/ \;
          ls -la output

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexoraVPN-real-SFA-apk
          path: output/*.apk
